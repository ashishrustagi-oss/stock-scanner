name: Dhan Token Refresh
# Refreshes Dhan access token daily ~8:51 AM IST (offset off the round
# :15 mark — GitHub's cron queue is heaviest right on :00/:15/:30/:45,
# which caused delayed/dropped triggers). Keeps the same ~30 min buffer
# before the first trade_scan_dhan cron (3:51 UTC / 9:21 AM IST).

on:
  workflow_dispatch:
  schedule:
    - cron: "21 3 * * 1-5"

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install dhanhq pyotp PyGithub requests

      - name: Refresh Dhan access token
        env:
          DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_API_KEY: ${{ secrets.DHAN_API_KEY }}
          DHAN_API_SECRET: ${{ secrets.DHAN_API_SECRET }}
          DHAN_PIN: ${{ secrets.DHAN_PIN }}
          DHAN_TOTP_SECRET: ${{ secrets.DHAN_TOTP_SECRET }}
          GH_TOKEN_PAT: ${{ secrets.GH_TOKEN_PAT }}
        run: python dhan_token_refresh.py
