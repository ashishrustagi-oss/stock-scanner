name: Trade Scan Dhan (Intraday)

on:
  workflow_dispatch: {}
  schedule:
    # SINGLE cron entry, deliberately — GitHub's own scheduling behavior
    # gets LESS reliable with more separate `- cron:` lines in one workflow
    # (each is tracked as an independent trigger competing in the queue).
    # The previous version here had 27 separate entries (one per 15-min
    # slot) and, despite an earlier off-round-minute fix, still missed
    # 11+ consecutive triggers on 2026-07-07 and delayed evening runs by
    # 3-4 hours on 2026-07-06 — a single entry is the more robust design.
    #
    # Fires every 13 min (odd/non-round step, same anti-congestion idea
    # as before) across UTC hours 3-11, covering 9:15 AM-3:45 PM IST with
    # margin on both sides. market_hours.py's is_within_trading_window()
    # guard (already in trade_dhan.py / trade_dhan_mtf.py / watchlist.py)
    # makes any run outside the real 9:15-15:45 IST window an instant,
    # harmless no-op — so firing a bit before/after market hours costs
    # nothing but a few extra seconds of runner time.
    - cron: "*/13 3-11 * * 1-5"

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service account credentials
        run: echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}" | base64 --decode > service_account.json

      - name: Run watchlist (self-decides if today's watchlist still needs sending)
        # No longer gated to a specific cron string — that broke silently
        # whenever GitHub dropped/delayed the exact 9:15 AM trigger under
        # load. watchlist.py now tracks "sent today" in cache/watchlist_state.json
        # and catches up on whichever run fires first after market open.
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON_PATH: service_account.json
        run: python -c "import watchlist; import logging; logging.basicConfig(level=logging.INFO); watchlist.run_watchlist()"
      
      - name: Remove credentials file
        if: always()
        run: rm -f service_account.json

      - name: Persist trade state
        if: always()
        run: |
          git config user.name "scanner-bot"
          git config user.email "actions@github.com"
          git pull --rebase origin main || true
          git add cache/trade_state.json cache/watchlist_state.json 2>/dev/null || true
          git diff --quiet --cached || git commit -m "Update trade state [skip ci]"
          git push || true
