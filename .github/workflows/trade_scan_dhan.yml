name: Trade Scan Dhan (Intraday)

on:
  workflow_dispatch: {}
  schedule:
    # Target: ~9:15 AM-3:45 PM IST every 15 min. Deliberately offset +6 min
    # off the round :00/:15/:30/:45 marks — GitHub's scheduler queues
    # heaviest right on those marks (every repo on GitHub fires at once),
    # which was causing triggers to be delayed by 30-90+ min or dropped
    # outright. Off-round minutes queue far more reliably.
    - cron: "51 3 * * 1-5"
    - cron: "6 4 * * 1-5"
    - cron: "21 4 * * 1-5"
    - cron: "36 4 * * 1-5"
    - cron: "51 4 * * 1-5"
    - cron: "6 5 * * 1-5"
    - cron: "21 5 * * 1-5"
    - cron: "36 5 * * 1-5"
    - cron: "51 5 * * 1-5"
    - cron: "6 6 * * 1-5"
    - cron: "21 6 * * 1-5"
    - cron: "36 6 * * 1-5"
    - cron: "51 6 * * 1-5"
    - cron: "6 7 * * 1-5"
    - cron: "21 7 * * 1-5"
    - cron: "36 7 * * 1-5"
    - cron: "51 7 * * 1-5"
    - cron: "6 8 * * 1-5"
    - cron: "21 8 * * 1-5"
    - cron: "36 8 * * 1-5"
    - cron: "51 8 * * 1-5"
    - cron: "6 9 * * 1-5"
    - cron: "21 9 * * 1-5"
    - cron: "36 9 * * 1-5"
    - cron: "51 9 * * 1-5"
    - cron: "6 10 * * 1-5"
    - cron: "21 10 * * 1-5"

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service account credentials
        run: echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}" | base64 --decode > service_account.json

      - name: Run watchlist (self-decides if today's watchlist still needs sending)
        # No longer gated to a specific cron string — that broke silently
        # whenever GitHub dropped/delayed the exact 9:15 AM trigger under
        # load. watchlist.py now tracks "sent today" in cache/watchlist_state.json
        # and catches up on whichever run fires first after market open.
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON_PATH: service_account.json
        run: python -c "import watchlist; import logging; logging.basicConfig(level=logging.INFO); watchlist.run_watchlist()"

      - name: Run Dhan trade cycle (Strategy 1 — Supertrend Daily)
        env:
          DHAN_CLIENT_ID:    ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID:    ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON_PATH: service_account.json
        run: python trade_dhan.py

      - name: Run Dhan MTF trade cycle (Strategy 2 — Multi-Timeframe)
        env:
          DHAN_CLIENT_ID:    ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON_PATH: service_account.json
        run: python trade_dhan_mtf.py

      - name: Remove credentials file
        if: always()
        run: rm -f service_account.json

      - name: Persist trade state
        if: always()
        run: |
          git config user.name "scanner-bot"
          git config user.email "actions@github.com"
          git pull --rebase origin main || true
          git add cache/trade_state.json cache/watchlist_state.json 2>/dev/null || true
          git diff --quiet --cached || git commit -m "Update trade state [skip ci]"
          git push || true
